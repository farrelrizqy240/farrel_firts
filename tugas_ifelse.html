<!DOCTYPE html>
<html>
<head>
    <title>If Else Kompleks</title>
</head>
<body>

<h2>Penentuan Kelulusan Mahasiswa</h2>

<script>
    let nilai = 85;
    let absensi = 90;

    if (nilai >= 80 && absensi >= 75) {
        console.log("Lulus dengan predikat A");
    } else if (nilai >= 70 && absensi >= 75) {
        console.log("Lulus dengan predikat B");
    } else if (nilai >= 60 && absensi >= 75) {
        console.log("Lulus dengan predikat C");
    } else {
        console.log("Tidak Lulus");
    }
</script>

</body>
</html>
